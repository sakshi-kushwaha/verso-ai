name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy build to backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Upload built static files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/static/
          target: /root/verso-ai/
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /root/verso-ai
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            pkill -f "uvicorn main:app" || true
            sleep 2
            nohup bash -c 'cd /root/verso-ai/backend && source venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port 8000' > /root/verso-ai/server.log 2>&1 &
            disown
            sleep 3
            curl -sf http://localhost:8000/health && echo " => Server is healthy" || echo " => Health check failed"
