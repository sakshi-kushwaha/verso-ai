name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy build to backend/static
        run: |
          # Preserve stock videos before replacing static dir
          cp -r backend/static/stock-videos /tmp/stock-videos-backup 2>/dev/null || true
          rm -rf backend/static
          cp -r frontend/dist backend/static
          # Restore stock videos into the built static dir
          if [ -d /tmp/stock-videos-backup ]; then
            cp -r /tmp/stock-videos-backup backend/static/stock-videos
          fi

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull code and sync dependencies on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd /root/verso-ai
            git pull origin main
            bash ec2-setup.sh --deploy
          ENDSSH

      - name: Upload built static files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/static/
          target: /root/verso-ai/
          overwrite: true

      - name: Restart server on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            pkill -f "uvicorn main:app" || true
            sleep 2
            cd /root/verso-ai/backend
            source venv/bin/activate
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > /root/verso-ai/server.log 2>&1 < /dev/null &
            sleep 3
            curl -sf http://localhost:8000/health && echo " => Server is healthy" || echo " => Health check failed"
          ENDSSH
